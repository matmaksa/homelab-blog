<!-- GoatCounter Analytics -->
<script data-goatcounter="https://matmaksa.goatcounter.com/count"
  async src="//gc.zgo.at/count.js"></script>

<!-- Robots / Noindex -->
{{- if .Params.noindex | default .Params.robotsNoIndex | default false }}
<meta name="robots" content="noindex, nofollow">
{{- end }}

<!-- Favicon (SVG-based) -->
<link rel="icon" href="{{ "safari-pinned-tab.svg" | relURL }}" type="image/svg+xml">
<link rel="mask-icon" href="{{ "safari-pinned-tab.svg" | relURL }}" color="#2563eb">

<!-- Preview Banner Styling -->
{{- if .Params.preview }}
<style>
  /* ── Preview Banner (existing) ── */
  .preview-banner {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
    background: #fff3cd;
    border: 2px solid #ffc107;
    border-radius: 8px;
    color: #856404;
    font-size: 0.95rem;
    line-height: 1.5;
  }
  .preview-banner-icon {
    font-size: 1.5rem;
    flex-shrink: 0;
    line-height: 1;
  }
  .preview-banner-text { flex: 1; }
  .preview-banner-text strong { display: block; margin-bottom: 4px; }
  .preview-banner-text small { opacity: 0.8; }
  .preview-banner-text code {
    background: rgba(133, 100, 4, 0.1);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 0.85rem;
  }

  /* ══════════════════════════════════════════════════════════════
     READABILITY IMPROVEMENTS (Preview-only via .preview-mode)
     ══════════════════════════════════════════════════════════════ */

  /* 1. FLIESSTEXT – max. Breite, Schrift, Zeilenhöhe, Absatzabstand */
  .preview-mode .post-content {
    max-width: 760px !important;
    margin-left: auto !important;
    margin-right: auto !important;
    font-size: 18px !important;
    line-height: 1.75 !important;
  }

  .preview-mode .post-content p {
    margin-bottom: 1.6em !important;
  }

  /* 2. ÜBERSCHRIFTEN – mehr Abstand drüber, klare Hierarchie */
  .preview-mode .post-content h2 {
    margin-top: 2.4em !important;
    margin-bottom: 0.6em !important;
    font-size: 1.55rem !important;
  }
  .preview-mode .post-content h3 {
    margin-top: 2em !important;
    margin-bottom: 0.5em !important;
    font-size: 1.25rem !important;
  }
  .preview-mode .post-content h4 {
    margin-top: 1.6em !important;
    margin-bottom: 0.4em !important;
  }

  /* Keine Überschrift klebt an Tabelle/Box */
  .preview-mode .post-content h2 + *,
  .preview-mode .post-content h3 + * {
    margin-top: 0.5em !important;
  }

  /* 3. TABELLEN – mehr Innenabstand, horizontal scrollbar */
  .preview-mode .post-content table {
    width: 100% !important;
    display: block !important;
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch !important;
    margin: 1.5em 0 !important;
    font-size: 0.92rem !important;
    border-collapse: collapse !important;
  }

  .preview-mode .post-content table th,
  .preview-mode .post-content table td {
    padding: 10px 14px !important;
    white-space: nowrap !important;
    border: 1px solid var(--border, #ddd);
  }

  .preview-mode .post-content table th {
    font-weight: 600;
    background: var(--tertiary, #f5f5f5);
  }

  /* Lange Tabellen einklappbar */
  .preview-mode .post-content details.table-toggle {
    margin: 1.5em 0;
  }
  .preview-mode .post-content details.table-toggle summary {
    cursor: pointer;
    font-weight: 600;
    padding: 8px 12px;
    background: var(--tertiary, #f0f0f0);
    border-radius: 6px;
    margin-bottom: 0.5em;
    font-size: 0.92rem;
  }

  /* 4. INFO-BOXEN */
  .preview-mode .post-content .info-box {
    padding: 16px 20px;
    margin: 1.5em 0;
    border-radius: 8px;
    border-left: 4px solid;
    font-size: 0.95rem;
    line-height: 1.6;
  }
  .preview-mode .post-content .info-box-title {
    font-weight: 700;
    display: block;
    margin-bottom: 4px;
  }

  .preview-mode .post-content .info-box.zu-wissen { background: #e8f4f8; border-left-color: #3498db; }
  .preview-mode .post-content .info-box.meine-erfahrung { background: #fef9e7; border-left-color: #f39c12; }
  .preview-mode .post-content .info-box.wichtig { background: #fdedec; border-left-color: #e74c3c; }
  .preview-mode .post-content .info-box.technische-details { background: #f4ecf7; border-left-color: #9b59b6; }

  /* Dark Mode Varianten */
  [data-theme=dark] .preview-mode .post-content .info-box.zu-wissen { background: #1a2a3a; border-left-color: #5dade2; }
  [data-theme=dark] .preview-mode .post-content .info-box.meine-erfahrung { background: #3a2e1a; border-left-color: #f5b041; }
  [data-theme=dark] .preview-mode .post-content .info-box.wichtig { background: #3a1a1a; border-left-color: #ec7063; }
  [data-theme=dark] .preview-mode .post-content .info-box.technische-details { background: #2a1a3a; border-left-color: #af7ac5; }

  /* 5. INHALTSVERZEICHNIS – auf Mobil einklappbar */
  .preview-mode .toc {
    max-height: none !important;
  }
  @media (max-width: 768px) {
    .preview-mode .toc details:not([open]) {
      max-height: 2.4em;
      overflow: hidden;
    }
    .preview-mode .toc details summary {
      cursor: pointer;
      font-weight: 600;
      padding: 4px 0;
    }
    .preview-mode .toc details[open] {
      max-height: none;
    }
    /* Doppelte Inhaltsübersicht vermeiden */
    .preview-mode .toc .inner:empty { display: none; }
  }

  /* 6. ARTIKELABSÄTZE begrenzen (Hinweis via CSS, redaktionell via Shortcode) */
  .preview-mode .post-content p:not(.info-box *) {
    max-width: 760px;
  }

  /* Technische Details als Collapse stilisieren */
  .preview-mode .post-content details.tech-detail {
    margin: 1em 0;
    padding: 12px 16px;
    background: var(--tertiary, #f8f8f8);
    border-radius: 6px;
    font-size: 0.9rem;
  }
  .preview-mode .post-content details.tech-detail summary {
    cursor: pointer;
    font-weight: 600;
    color: var(--primary, #333);
  }

  /* 7. PREVIEW-ÜBERSICHT-SEITE Styling */
  .preview-overview {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  .preview-overview h1 { font-size: 1.8rem; margin-bottom: 0.5em; }
  .preview-overview .preview-meta {
    color: var(--secondary, #666);
    font-size: 0.9rem;
    margin-bottom: 2em;
  }
  .preview-card {
    border: 1px solid var(--border, #ddd);
    border-radius: 8px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1rem;
    background: var(--entry, #fff);
    transition: border-color 0.2s;
  }
  .preview-card:hover { border-color: var(--primary, #2563eb); }
  .preview-card h3 { margin: 0 0 0.3em; font-size: 1.15rem; }
  .preview-card h3 a { text-decoration: none; }
  .preview-card .preview-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 0.78rem;
    font-weight: 600;
    margin-bottom: 0.5em;
  }
  .preview-badge.new { background: #d1fae5; color: #065f46; }
  .preview-badge.modified { background: #fef3c7; color: #92400e; }
  .preview-card .preview-desc {
    font-size: 0.9rem;
    color: var(--secondary, #555);
    margin: 0.3em 0 0;
    line-height: 1.5;
  }

  /* 8. STARTSEITE Preview – apply readability to homepage preview too */
  .preview-mode.home-page .home-content {
    max-width: 860px;
    margin: 0 auto;
  }
</style>
{{- end }}

<!-- Main JS -->
<script src="{{ "/js/main.js" | relURL }}" defer></script>
