<script data-goatcounter="https://matmaksa.goatcounter.com/count"
  async src="//gc.zgo.at/count.js"></script>

{{- if .Params.noindex | default .Params.robotsNoIndex | default false }}
<meta name="robots" content="noindex, nofollow">
{{- end }}

{{- if .Params.preview }}
<style>
  .preview-banner {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
    background: #fff3cd;
    border: 2px solid #ffc107;
    border-radius: 8px;
    color: #856404;
    font-size: 0.95rem;
    line-height: 1.5;
  }
  .preview-banner-icon {
    font-size: 1.5rem;
    flex-shrink: 0;
    line-height: 1;
  }
  .preview-banner-text {
    flex: 1;
  }
  .preview-banner-text strong {
    display: block;
    margin-bottom: 4px;
  }
  .preview-banner-text small {
    opacity: 0.8;
  }
  .preview-banner-text code {
    background: rgba(133, 100, 4, 0.1);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 0.85rem;
  }
</style>
{{- end }}
