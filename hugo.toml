baseURL = 'https://matmaksa.github.io/homelab-blog/'
title = 'Homelab Guide'
languageCode = 'de-de'
theme = 'PaperMod'
defaultContentLanguage = 'de'
enableEmoji = true
enableRobotsTXT = true
pygmentsUseClasses = true
buildDrafts = false

[params]
  # Search page exists
  searchPage = true

  [params.analytics.google]
    SiteVerificationTag = "google09a060456df1ed16.html"

  # Label / Branding
  [params.label]
    tagline = "Praxis-Guides für dein Homelab-Rechenzentrum"

  ShowShareButtons = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowToc = true
  description = "Homelab, Virtualisierung & KI Modelle – Praxis-Guides für dein Zuhause-Rechenzentrum"
  keywords = ["Homelab", "Proxmox", "Virtualisierung", "KI Modelle", "Docker", "Server", "Selbsthosten"]
  images = ["/homelab-blog/og-image.png"]

  [params.editPost]
    URL = "https://github.com/matmaksa/homelab-blog/content"
    Text = "Bearbeiten"

  [params.footer]
    text = "Als Amazon-Partner verdiene ich an qualifizierten Verkäufen."

  [params.homeInfoParams]
    Title = "Homelab Guide"
    Content = "Praxis-Guides für dein Homelab – Virtualisierung, Docker, KI Modelle und mehr. Betrieben mit Leidenschaft und Kabelbindern."

  # Disable default PaperMod theme toggle (we use our own)
  disableThemeToggle = false

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/matmaksa/homelab-blog"
[[params.socialIcons]]
  name = "instagram"
  url = "https://instagram.com/matmaksa"

