baseURL = 'https://matmaksa.de/'
title = 'Homelab Guide'
languageCode = 'de-de'
theme = 'PaperMod'
defaultContentLanguage = 'de'
enableEmoji = true
enableRobotsTXT = true
pygmentsUseClasses = true
buildDrafts = false

[params]
  # Search page exists
  searchPage = true

  [params.analytics.google]
    SiteVerificationTag = "google09a060456df1ed16.html"

  # Branding
  description = "Praxis-Guides für dein Homelab – Mini-PCs, Proxmox, Docker, Selfhosting und Backups. Leise, sparsam und selbst getestet."
  keywords = ["Homelab", "Proxmox", "Mini-PC", "Docker", "Selfhosting", "Homelab Einsteiger", "Server"]
  images = ["/og-image.png"]

  ShowShareButtons = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowToc = true

  [params.editPost]
    URL = "https://github.com/matmaksa/homelab-blog/blob/main/content"
    Text = "Verbessern"

  [params.footer]
    text = "Als Amazon-Partner verdiene ich an qualifizierten Verkäufen."

  [params.homeInfoParams]
    Title = "Homelab Guide"
    Content = "Praxis-Guides für dein Homelab – Virtualisierung, Docker, Selfhosting und mehr. Betrieben mit Leidenschaft und Kabelbindern."

  disableThemeToggle = false

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/matmaksa/homelab-blog"
[[params.socialIcons]]
  name = "instagram"
  url = "https://instagram.com/matmaksa"

# Navigation – vereinfacht, aufgabenorientiert
[[menu.main]]
  identifier = "start"
  name = "Start hier"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "projekte"
  name = "Projekte"
  url = "/posts/"
  weight = 20

[[menu.main]]
  identifier = "hardware"
  name = "Hardware"
  url = "/categories/hardware/"
  weight = 30

[[menu.main]]
  identifier = "proxmox-docker"
  name = "Proxmox & Docker"
  url = "/categories/virtualisierung/"
  weight = 40

[[menu.main]]
  identifier = "suche"
  name = "Suche"
  url = "/search/"
  weight = 60

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
