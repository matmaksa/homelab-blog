<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">DNS-Ablauf vor und nach Pi-hole</title>
  <desc id="desc">Links fragt ein Rechner den Router. Rechts fragt ein Rechner zuerst Pi-hole; Pi-hole filtert bekannte Werbe- und Tracking-Domains und fragt bei Bedarf über den Router im Internet nach.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/></marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/></marker>
    <style>
      .title{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}.subtitle{font:500 17px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}.label{font:700 18px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}.small{font:500 15px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}.hint{font:600 14px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
    </style>
  </defs>
  <rect width="1200" height="560" rx="24" fill="#0f172a"/>
  <text x="48" y="52" class="title">So fragt dein Netzwerk nach einer Internetadresse</text>
  <text x="48" y="80" class="subtitle">DNS übersetzt einen Namen wie www.google.de in die passende Internetadresse.</text>

  <g transform="translate(40 112)">
    <rect width="545" height="400" rx="20" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <text x="28" y="42" class="title">Vorher</text>
    <text x="28" y="69" class="subtitle">Der Rechner nutzt den bisherigen DNS-Weg über den Router.</text>
    <rect x="35" y="185" width="115" height="75" rx="10" fill="#164e63" stroke="#38bdf8" stroke-width="3"/>
    <rect x="53" y="201" width="79" height="43" rx="4" fill="#0f172a" stroke="#7dd3fc" stroke-width="2"/>
    <path d="M78 260 v14 h30 v-14" fill="none" stroke="#7dd3fc" stroke-width="3"/>
    <text x="50" y="292" class="label">Rechner</text>
    <rect x="221" y="181" width="105" height="85" rx="14" fill="#7c2d12" stroke="#fb923c" stroke-width="3"/>
    <path d="M243 205 h61 M243 222 h61 M243 239 h61" stroke="#fed7aa" stroke-width="3"/>
    <text x="232" y="292" class="label">Router</text>
    <path d="M149 213 H220" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow-blue)"/>
    <rect x="157" y="135" width="192" height="33" rx="16" fill="#bae6fd"/>
    <text x="172" y="157" class="hint">Anfrage: www.google.de?</text>
    <path d="M327 214 C385 214 399 182 444 182" fill="none" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow-blue)"/>
    <g transform="translate(425 122)">
      <path d="M22 63c-21 0-25-28-4-35 5-25 42-22 47 1 21-5 31 25 11 34H22z" fill="#e0f2fe" stroke="#38bdf8" stroke-width="3"/>
      <text x="11" y="90" class="label">Internet</text>
    </g>
    <path d="M444 254 C394 254 378 240 327 240" fill="none" stroke="#34d399" stroke-width="5" marker-end="url(#arrow-green)"/>
    <path d="M220 240 H150" stroke="#34d399" stroke-width="5" marker-end="url(#arrow-green)"/>
    <rect x="178" y="304" width="192" height="33" rx="16" fill="#bbf7d0"/>
    <text x="230" y="326" class="hint">Antwort</text>
  </g>

  <g transform="translate(615 112)">
    <rect width="545" height="400" rx="20" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <text x="28" y="42" class="title">Nachher</text>
    <text x="28" y="69" class="subtitle">Der Rechner fragt zuerst Pi-hole.</text>
    <rect x="27" y="185" width="92" height="75" rx="10" fill="#164e63" stroke="#38bdf8" stroke-width="3"/>
    <rect x="42" y="201" width="62" height="43" rx="4" fill="#0f172a" stroke="#7dd3fc" stroke-width="2"/>
    <path d="M61 260 v14 h24 v-14" fill="none" stroke="#7dd3fc" stroke-width="3"/>
    <text x="32" y="292" class="label">Rechner</text>
    <path d="M119 249 H353" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="8 7"/>
    <rect x="172" y="171" width="145" height="104" rx="14" fill="#064e3b" stroke="#34d399" stroke-width="3"/>
    <rect x="195" y="190" width="99" height="47" rx="5" fill="#0f172a" stroke="#6ee7b7" stroke-width="2"/>
    <circle cx="244" cy="252" r="5" fill="#34d399"/>
    <text x="182" y="303" class="label">Miniserver mit Pi-hole</text>
    <path d="M120 213 H171" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow-blue)"/>
    <rect x="55" y="135" width="192" height="33" rx="16" fill="#bae6fd"/>
    <text x="70" y="157" class="hint">Anfrage: www.google.de?</text>
    <rect x="354" y="181" width="94" height="85" rx="14" fill="#7c2d12" stroke="#fb923c" stroke-width="3"/>
    <path d="M374 205 h54 M374 222 h54 M374 239 h54" stroke="#fed7aa" stroke-width="3"/>
    <text x="361" y="292" class="label">Router</text>
    <path d="M318 213 H353" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow-blue)"/>
    <path d="M448 214 C478 214 477 182 500 182" fill="none" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow-blue)"/>
    <g transform="translate(471 122)">
      <path d="M22 63c-21 0-25-28-4-35 5-25 42-22 47 1 21-5 31 25 11 34H22z" fill="#e0f2fe" stroke="#38bdf8" stroke-width="3"/>
      <text x="11" y="90" class="label">Internet</text>
    </g>
    <path d="M500 254 C477 254 471 240 448 240" fill="none" stroke="#34d399" stroke-width="5" marker-end="url(#arrow-green)"/>
    <path d="M353 240 H318" stroke="#34d399" stroke-width="5" marker-end="url(#arrow-green)"/>
    <path d="M171 240 H120" stroke="#34d399" stroke-width="5" marker-end="url(#arrow-green)"/>
    <rect x="160" y="330" width="235" height="43" rx="12" fill="#d1fae5"/>
    <text x="176" y="348" class="hint">Pi-hole filtert bekannte Werbe-</text>
    <text x="183" y="366" class="hint">und Tracking-Domains.</text>
  </g>
</svg>
