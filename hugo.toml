baseURL = 'https://matmaksa.de/'
title = 'Homelab Guide'
languageCode = 'de-de'
theme = 'PaperMod'
defaultContentLanguage = 'de'
enableEmoji = true
enableRobotsTXT = true
pygmentsUseClasses = true
buildDrafts = false

[params]
  # Search page exists
  searchPage = true

  [params.analytics.google]
    SiteVerificationTag = "google09a060456df1ed16.html"

  # Branding
  description = "Praxis-Guides für dein Homelab – Mini-PCs, Proxmox, Docker, Selfhosting und Backups. Leise, sparsam und selbst getestet."
  keywords = ["Homelab", "Proxmox", "Mini-PC", "Docker", "Selfhosting", "Homelab Einsteiger", "Server"]
  images = ["/og-image.png"]

  ShowShareButtons = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowToc = true

  [params.editPost]
    URL = "https://github.com/matmaksa/homelab-blog/blob/main/content"
    Text = "Verbessern"

  [params.ebay]
    # eBay Partner Network – zentrale Konfiguration
    #
    # SO AKTIVIEREN:
    #   1. Im eBay-Partner-Dashboard (https://www.ebaypartnernetwork.com)
    #      mit dem Simple Link Generator einen echten Partnerlink erzeugen,
    #      z. B. zu einer Suchergebnisseite.
    #   2. Die vollständige URL (inkl. mkevt, mkcid, mkrid, campid, toolid)
    #      hier als baseUrl eintragen.
    #   3. Den Suchbegriff-Parameter (_nkw=) aus der URL entfernen, aber
    #      das abschließende & oder ? stehen lassen.
    #
    #   Beispiel (Platzhalter – durch echte Werte ersetzen):
    #   baseUrl = "https://www.ebay.de/sch/i.html?_sop=15&_LH_ItemCondition=3000&mkevt=1&mkcid=1&mkrid=707-53477-19255-0&campid=CAMPAGN_ID&toolid=TOOL_ID&"
    #
    #   Der Shortcode hängt dann &_nkw=SUCHBEGRIFF an.
    #
    # OHNE Konfiguration:
    #   - Keine Affiliate-Links (auch keine scheinbar getrackten)
    #   - Shortcodes geben nur den Linktext aus (kein Hyperlink)
    # baseUrl = ""

  [params.footer]
    text = "Als Amazon-Partner verdiene ich an qualifizierten Verkäufen. eBay-Partner-Links sind in Vorbereitung – Details folgen."

  [params.homeInfoParams]
    Title = "Homelab Guide"
    Content = "Praxis-Guides für dein Homelab – Virtualisierung, Docker, Selfhosting und mehr. Betrieben mit Leidenschaft und Kabelbindern."

  disableThemeToggle = false

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/matmaksa/homelab-blog"
[[params.socialIcons]]
  name = "instagram"
  url = "https://instagram.com/matmaksa"

# Navigation – vereinfacht, aufgabenorientiert
[[menu.main]]
  identifier = "start"
  name = "Start hier"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "projekte"
  name = "Projekte"
  url = "/posts/"
  weight = 20

[[menu.main]]
  identifier = "hardware"
  name = "Hardware"
  url = "/categories/hardware/"
  weight = 30

[[menu.main]]
  identifier = "proxmox-docker"
  name = "Proxmox & Docker"
  url = "/categories/virtualisierung/"
  weight = 40

[[menu.main]]
  identifier = "suche"
  name = "Suche"
  url = "/search/"
  weight = 60

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
