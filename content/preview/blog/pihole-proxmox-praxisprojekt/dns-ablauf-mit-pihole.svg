<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">DNS-Weg vor und mit Pi-hole</title>
  <desc id="desc">Zwei klare Abläufe: Vorher fragt ein Rechner den bisherigen DNS-Server. Mit Pi-hole fragt der Rechner Pi-hole ausdrücklich als DNS-Server; Pi-hole fragt über Router und Upstream-DNS weiter.</desc>
  <defs>
    <marker id="blueArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
    <marker id="greenArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#15803d"/></marker>
    <style>
      .heading { font: 700 32px Arial, sans-serif; fill: #172033; }
      .panelTitle { font: 700 28px Arial, sans-serif; fill: #172033; }
      .label { font: 700 19px Arial, sans-serif; fill: #172033; }
      .small { font: 500 16px Arial, sans-serif; fill: #334155; }
      .arrowLabel { font: 600 15px Arial, sans-serif; fill: #1e3a8a; }
      .answerLabel { font: 600 15px Arial, sans-serif; fill: #166534; }
    </style>
  </defs>

  <rect width="1200" height="660" fill="#f8fafc"/>
  <text x="48" y="52" class="heading">So läuft eine DNS-Anfrage – vorher und mit Pi-hole</text>
  <text x="48" y="80" class="small">DNS übersetzt einen Namen wie www.google.de in eine Internetadresse.</text>

  <rect x="40" y="110" width="1120" height="210" rx="18" fill="#e0f2fe" stroke="#93c5fd" stroke-width="2"/>
  <text x="72" y="152" class="panelTitle">Vorher: bisheriger DNS-Weg</text>
  <text x="72" y="182" class="small">Der Rechner fragt den bisher eingestellten DNS-Server.</text>
  <rect x="86" y="218" width="170" height="60" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="126" y="253" class="label">Rechner</text>
  <rect x="488" y="218" width="220" height="60" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="515" y="253" class="label">Bisheriger DNS-Server</text>
  <rect x="934" y="218" width="150" height="60" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="970" y="253" class="label">Internet</text>
  <path d="M258 242 H484" stroke="#2563eb" stroke-width="4" marker-end="url(#blueArrow)"/>
  <text x="310" y="226" class="arrowLabel">DNS-Anfrage</text>
  <path d="M710 242 H930" stroke="#2563eb" stroke-width="4" marker-end="url(#blueArrow)"/>
  <path d="M930 266 H714" stroke="#15803d" stroke-width="4" marker-end="url(#greenArrow)"/>
  <path d="M484 266 H258" stroke="#15803d" stroke-width="4" marker-end="url(#greenArrow)"/>
  <text x="347" y="294" class="answerLabel">Antwort mit IP-Adresse</text>

  <rect x="40" y="350" width="1120" height="250" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="72" y="392" class="panelTitle">Mit Pi-hole: Pi-hole ist ausdrücklich dein DNS-Server</text>
  <text x="72" y="422" class="small">Der Router oder Switch transportiert nur Pakete. Er leitet DNS nicht automatisch zu Pi-hole um.</text>
  <rect x="76" y="476" width="150" height="60" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="112" y="511" class="label">Rechner</text>
  <rect x="330" y="462" width="190" height="88" rx="10" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
  <text x="380" y="497" class="label">Pi-hole</text>
  <text x="357" y="524" class="small">filtert bekannte Werbung</text>
  <rect x="630" y="476" width="140" height="60" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="663" y="511" class="label">Router</text>
  <rect x="868" y="462" width="190" height="88" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="894" y="497" class="label">Upstream-DNS</text>
  <text x="905" y="524" class="small">und Internet</text>
  <path d="M228 506 H326" stroke="#2563eb" stroke-width="4" marker-end="url(#blueArrow)"/>
  <text x="215" y="461" class="arrowLabel">DNS-Anfrage</text>
  <path d="M522 506 H626" stroke="#2563eb" stroke-width="4" marker-end="url(#blueArrow)"/>
  <path d="M772 506 H864" stroke="#2563eb" stroke-width="4" marker-end="url(#blueArrow)"/>
  <path d="M864 530 H776" stroke="#15803d" stroke-width="4" marker-end="url(#greenArrow)"/>
  <path d="M626 530 H526" stroke="#15803d" stroke-width="4" marker-end="url(#greenArrow)"/>
  <path d="M326 530 H230" stroke="#15803d" stroke-width="4" marker-end="url(#greenArrow)"/>
  <text x="356" y="582" class="answerLabel">Antwort: IP-Adresse oder bei einer blockierten Domain 0.0.0.0</text>

  <text x="48" y="636" class="small">Wichtig: Trage Pi-hole am Gerät oder im DHCP deines Routers als DNS-Server ein. Erst dann fragt der Rechner Pi-hole.</text>
</svg>
