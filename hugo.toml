baseURL = 'https://matmaksa.de/'
title = 'Homelab Guide'
languageCode = 'de-de'
theme = 'PaperMod'
defaultContentLanguage = 'de'
enableEmoji = true
enableRobotsTXT = true
pygmentsUseClasses = true
buildDrafts = false

[params]
  [params.analytics.google]
    SiteVerificationTag = "google09a060456df1ed16.html"

  # Label / Branding (raspberry.tips-style Header)
  [params.label]
    tagline = "Praxis-Guides für dein Homelab-Rechenzentrum"

  ShowShareButtons = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowToc = true
  description = "Homelab, Virtualisierung & KI Modelle – Praxis-Guides für dein Zuhause-Rechenzentrum"
  keywords = ["Homelab", "Proxmox", "Virtualisierung", "KI Modelle", "Docker", "Server", "Selbsthosten"]
  images = ["/og-image.png"]

  [params.editPost]
    URL = "https://github.com/matmaksa/homelab-blog/content"
    Text = "Bearbeiten"

  [params.footer]
    text = "Als Amazon-Partner verdiene ich an qualifizierten Verkäufen."

  [params.homeInfoParams]
    Title = "Homelab Guide"
    Content = "Praxis-Guides für dein Homelab – Virtualisierung, Docker, KI Modelle und mehr. Betrieben mit Leidenschaft und Kabelbindern."

  # Search page exists
  searchPage = true

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/matmaksa/homelab-blog"
[[params.socialIcons]]
  name = "instagram"
  url = "https://instagram.com/matmaksa"

[[menu.main]]
  identifier = "categories"
  name = "Kategorien"
  url = "/categories/"
  weight = 10
[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20
[[menu.main]]
  identifier = "suche"
  name = "🔍 Suche"
  url = "/search/"
  weight = 30
[[menu.main]]
  identifier = "about"
  name = "Über"
  url = "/about/"
  weight = 40
[[menu.main]]
  identifier = "empfehlungen"
  name = "⭐ Empfehlungen"
  url = "/links/"
  weight = 50

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
